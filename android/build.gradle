// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.2'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // El plugin @capacitor/camera trae androidx.core:core-ktx:1.17.0 hardcodeado,
    // que exige Android Gradle Plugin 8.9.1+. Este proyecto usa AGP 8.7.2, asi que
    // fijamos androidx.core a 1.15.0 (la version del scaffold, compatible con AGP 8.7.2).
    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core:1.15.0'
            force 'androidx.core:core-ktx:1.15.0'
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
